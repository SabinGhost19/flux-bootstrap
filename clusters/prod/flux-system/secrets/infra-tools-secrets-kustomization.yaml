apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-tools-observability-grafana-resources
    - name: infra-tools-identity-tf
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 5m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/secrets

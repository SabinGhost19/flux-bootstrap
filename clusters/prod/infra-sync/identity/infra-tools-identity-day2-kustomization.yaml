apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-identity-day2
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-tools-identity
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 5m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/identity/keycloak/day2
  healthChecks:
    - apiVersion: k8s.keycloak.org/v2alpha1
      kind: Keycloak
      name: keycloak
      namespace: platform-identity
    - apiVersion: k8s.keycloak.org/v2alpha1
      kind: KeycloakRealmImport
      name: master-prod-realm
      namespace: platform-identity
    - apiVersion: k8s.keycloak.org/v2alpha1
      kind: KeycloakOIDCClient
      name: oauth2-proxy-client
      namespace: platform-identity

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-networking
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-tools-sources
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 15m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/networking
